name: Win32-256MB-FastBuild

on:
  workflow_dispatch: # 手動実行用

jobs:
  build-win32:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install MinGW & Dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential mingw-w64 nasm libpng-dev zlib1g-dev

      - name: Execute Build Script
        run: |
          chmod +x template/win_x86/build_no_docker.sh
          template/win_x86/build_no_docker.sh

      - name: Upload Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: mupen64plus-win32-binaries
          # dllとexeをすべて回収
          path: |
            build_work/**/*.dll
            build_work/**/*.exe
